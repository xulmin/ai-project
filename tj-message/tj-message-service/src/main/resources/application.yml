server:
  port: 8085  #端口
  tomcat:
    uri-encoding: UTF-8   #服务编码
spring:
  profiles:
    active: local
  application:
    name: message-service
tj:
  swagger:
    enable: true
    enableResponseWrap: true
    package-path: com.tianji.message.controller
    title: 天机学堂 - 消息中心接口文档
    description: 该服务用于站内信、通知管理、短信发送等功能
    contact-name: 传智教育·研究院
    contact-url: http://www.itcast.cn/
    contact-email: zhanghuyi@itcast.cn
    version: v1.0
  auth:
    resource:
      enable: true
      excludeLoginPaths:
        - /students/register
        - /users/detail/{isStaff}
        - /users/list
        - GET:/users/{id}
        - /users/{id}/type
        - /users/ids
  jdbc:
    database: tj_message
  sms:
    ali:
      accessId: ${ALIYUN_ACCESS_KEY_ID:your-default-id}
      accessSecret: ${ALIYUN_ACCESS_KEY_SECRET:your-default-secret}
